<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Deep Blue Background -->
  <rect width="512" height="512" rx="110" fill="#13224F" />
  
  <!-- White Inner Border Frame matching logo -->
  <rect x="36" y="36" width="440" height="440" rx="74" fill="none" stroke="#FFFFFF" stroke-width="12" />
  
  <!-- Signature Bahia Prev Red Orbits -->
  <ellipse cx="256" cy="180" rx="270" ry="50" fill="none" stroke="#E31C24" stroke-width="24" transform="rotate(-15, 256, 180)" />
  <ellipse cx="256" cy="300" rx="270" ry="50" fill="none" stroke="#E31C24" stroke-width="24" transform="rotate(-15, 256, 300)" />
  
  <!-- Stylized Initials matching the brand font (bold, solid, crisp) -->
  <text x="256" y="325" font-family="'Poppins', 'Inter', 'Arial', sans-serif" font-weight="900" font-size="140" fill="#FFFFFF" text-anchor="middle" letter-spacing="-4">BP</text>
  
  <!-- Bahia Prev Red Dot -->
  <circle cx="345" cy="225" r="22" fill="#E31C24" />
</svg>
